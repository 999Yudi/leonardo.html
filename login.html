<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Doação</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #5e0000, #c40000);
        }

        .container {
            width: 1000px;
            height: 600px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.3);
        }

        /* LADO ESQUERDO */

        .left {
            width: 50%;

            background:
                linear-gradient(rgba(120, 0, 0, 0.4),
                    rgba(120, 0, 0, 0.4)),
                url('https://i.ibb.co/Tqb0JKsS/565f3a1e-e180-480c-8fc4-da5761211f96.jpg');

            background-size: cover;
            background-position: center;

            position: relative;
        }

        .texto {
            position: absolute;
            bottom: 40px;
            left: 40px;

            color: white;
        }

        .texto h1 {
            font-size: 55px;
            line-height: 60px;
            margin-bottom: 15px;
        }

        .texto p {
            font-size: 22px;
        }

        /* LADO DIREITO */

        .right {
            width: 50%;
            background: #f8f8f8;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 75%;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 40px;
            color: #b30000;
            font-size: 45px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
        }

        .input-group input {
            width: 100%;
            height: 55px;
            border-radius: 12px;
            border: 1px solid #ccc;
            padding-left: 15px;
            font-size: 16px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #c40000;
        }

        button {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 12px;

            background: linear-gradient(90deg, #ff1a1a, #b30000);

            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        @media(max-width: 900px) {

            .container {
                width: 95%;
                height: auto;
                flex-direction: column;
            }

            .left,
            .right {
                width: 100%;
            }

            .left {
                height: 300px;
            }

            .right {
                padding: 40px 0;
            }

            .texto h1 {
                font-size: 40px;
                line-height: 45px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- ESQUERDA -->
        <div class="left">

            <div class="texto">
                <h1>DOE<br>SANGUE,<br>DOE VIDAS</h1>

                <p>Um gesto simples que salva vidas.</p>
            </div>

        </div>

        <!-- DIREITA -->
        <div class="right">

            <div class="login-box">

                <h2>Login</h2>

                <div class="input-group">
                    <label>E-mail</label>
                    <input type="email" placeholder="Digite seu e-mail">
                </div>

                <div class="input-group">
                    <label>CPF</label>
                    <input type="text" placeholder="000.000.000-00">
                </div>

                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha">
                </div>

                <button>ENTRAR</button>

            </div>

        </div>

    </div>

</body>

</html>
